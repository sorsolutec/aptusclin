name: API Spec Validation

on:
  push:
    paths:
      - 'swagger*.yaml'
  pull_request:
    paths:
      - 'swagger*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install swagger-cli
        run: npm install -g swagger-cli
      - name: Validate OpenAPI spec
        run: swagger-cli validate swagger.v2.yaml
